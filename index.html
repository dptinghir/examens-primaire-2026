<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

:root {
    --green-dark: #0f6b2c;
    --green-main: #178d46;
    --green-light: #19b96b;
    --blue-main: #0d6efd;
    --bg-main: #eef7f4;
    --text-dark: #1f2937;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    background:
        radial-gradient(circle at top, #f8fffb 0%, #eef7f4 45%, #eaf3f0 100%);
    font-family: Tahoma, Arial, sans-serif;
    color: var(--text-dark);
    padding: 22px;
}

.page-wrapper {
    width: 100%;
    max-width: 780px;
    margin: auto;
}

.logo-card {
    background: white;
    border-radius: 14px;
    padding: 12px 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.10);
    margin: 0 auto 32px auto;
    max-width: 620px;
    text-align: center;
}

.logo-card img {
    max-width: 100%;
    height: 95px;
    object-fit: contain;
}

.main-card {
    background: white;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 14px 40px rgba(0,0,0,0.13);
}

.header-box {
    background: linear-gradient(135deg, #0f6b2c 0%, #126f32 45%, #0d5c2b 100%);
    color: white;
    padding: 34px 25px 28px 25px;
    text-align: center;
}

.header-icon {
    font-size: 30px;
    margin-bottom: 10px;
}

.header-box h1 {
    margin: 0;
    font-size: 25px;
    font-weight: 800;
    line-height: 1.8;
}

.session-pill {
    display: inline-block;
    margin-top: 16px;
    padding: 6px 24px;
    border-radius: 50px;
    background: rgba(255,255,255,0.92);
    color: var(--green-dark);
    font-weight: 800;
    font-size: 16px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.12);
}

.form-area {
    padding: 30px 26px 26px 26px;
}

.form-label {
    font-weight: 800;
    margin-bottom: 8px;
    color: #111827;
    display: block;
}

.form-label .icon {
    color: var(--green-main);
    margin-left: 5px;
}

.form-select,
.form-control {
    border-radius: 9px;
    height: 46px;
    border: 1px solid #d8dee6;
    font-size: 15px;
    background-color: #fff;
    transition: all 0.2s ease;
}

.form-select:focus,
.form-control:focus {
    border-color: var(--green-main);
    box-shadow: 0 0 0 0.18rem rgba(25, 135, 84, 0.18);
}

.form-select {
    direction: rtl;
    text-align: right;
    padding-right: 14px !important;
    padding-left: 45px !important;
    background-position: left 12px center !important;
}

.password-wrapper {
    position: relative;
}

.password-wrapper input {
    padding-left: 45px;
}

.eye-btn {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    border: none;
    background: transparent;
    color: #666;
    cursor: pointer;
    font-size: 16px;
}

.download-btn {
    width: 100%;
    border: none;
    border-radius: 9px;
    padding: 13px;
    background: linear-gradient(90deg, #15803d, #19b96b);
    color: white;
    font-size: 18px;
    font-weight: 800;
    margin-top: 8px;
    transition: all 0.25s ease;
}

.download-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(25, 135, 84, 0.30);
}

.info-note {
    margin-top: 20px;
    background: #f4fbf7;
    border-right: 4px solid var(--green-main);
    color: #4b5563;
    padding: 13px 16px;
    border-radius: 10px;
    font-size: 14px;
    text-align: center;
}

.footer-note {
    text-align: center;
    font-size: 12px;
    color: #7a7a7a;
    margin-top: 18px;
}

@media (max-width: 600px) {

    body {
        padding: 14px;
    }

    .logo-card {
        margin-bottom: 20px;
        padding: 10px;
    }

    .logo-card img {
        height: 78px;
    }

    .header-box {
        padding: 28px 18px 23px 18px;
    }

    .header-box h1 {
        font-size: 19px;
        line-height: 1.7;
    }

    .session-pill {
        font-size: 15px;
        padding: 5px 20px;
    }

    .form-area {
        padding: 22px 18px;
    }

    .download-btn {
        font-size: 17px;
    }
}

</style>

      "mdp": "12953D"
    }
  ]
};

const communeSelect = document.getElementById("communeSelect");
const centreSelect = document.getElementById("centreSelect");
const passwordDiv = document.getElementById("passwordDiv");
const passwordInput = document.getElementById("passwordInput");

let currentCentres = [];

function updateCentres() {

    const commune = communeSelect.value;
    currentCentres = data[commune] || [];

    centreSelect.innerHTML =
        '<option selected disabled>-- اختر مركز الامتحان --</option>';

    currentCentres.forEach(obj => {
        const option = document.createElement("option");
        option.value = obj.centre;
        option.textContent = obj.centre;
        centreSelect.appendChild(option);
    });

    passwordDiv.style.display = "none";
    passwordInput.value = "";
}

function showPasswordField() {

    passwordDiv.style.display = "block";
    passwordInput.value = "";

    setTimeout(() => {
        passwordInput.focus();
    }, 150);
}

function verifyPassword() {

    const centreName = centreSelect.value;
    const password = passwordInput.value.trim();

    const centreData = currentCentres.find(c => c.centre === centreName);

    if (!centreData) {
        alert("يرجى اختيار مركز الامتحان");
        return;
    }

    if (password === "") {
        alert("يرجى إدخال كلمة المرور");
        return;
    }

    if (password === centreData.mdp) {
        window.open(centreData.lien, "_blank");
    } else {
        alert("❌ كلمة المرور غير صحيحة");
        passwordInput.value = "";
        passwordInput.focus();
    }
}

function togglePassword() {
    if (passwordInput.type === "password") {
        passwordInput.type = "text";
    } else {
        passwordInput.type = "password";
    }
}

</script>
